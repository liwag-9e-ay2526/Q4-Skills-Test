<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Q4 SkillsTest1</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="login-body">

    <div class="login-container">

        <!-- LOGO -->
        <img src="" alt="Logo" class="login-logo">

        <h1 class="text-center mb-4">Notebook Login</h1>

        <!-- USERNAME -->
        <label>Username</label>
        <input type="text"
        id="username"
        class="form-control mb-3"
        placeholder="Enter username">

        <!-- PASSWORD -->
        <label>Password</label>
        <input type="password"
        id="password"
        class="form-control mb-3"
        placeholder="Enter password">

        <!-- LOGIN BUTTON -->
        <button onclick="login()" class="btn btn-info w-100 mb-2">
            Login
        </button>

        <!-- VIEW DETAILS BUTTON -->
        <button onclick="showDetails()" class="btn btn-dark w-100">
            View Login Details
        </button>

        <!-- OUTPUT -->
        <div id="details" class="mt-3 text-center"></div>

    </div>

<script src="main.js"></script>

</body>
</html>
