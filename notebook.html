<!-- notebook.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Notebook</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="nav-section p-3">

        <img src="img_avatar1.png" alt="Logo" class="logo">

        <ul class="nav flex-column mt-4">
            <li><a href="#">Dashboard</a></li>
            <li><a href="#">Virtual Notebooks</a></li>
            <li><a href="#">Tasks</a></li>
            <li><a href="#">Profile</a></li>
            <li><a href="#">Logout</a></li>
        </ul>

    </div>

    <!-- MAIN CONTENT -->
    <div class="container mt-4">

        <h2 class="bg-dark text-white rounded p-3">
            NOTEBOOKS
        </h2>

        <div class="row mt-4">

            <!-- ENGLISH -->
            <div class="col-md-4 mb-3">
                <div class="card shadow">
                    <div class="card-body">

                        <h4>English</h4>
                        <p>Ms. Avila</p>

                        <button class="btn btn-primary"
                        onclick="openNotebook('English')">
                            Open
                        </button>

                    </div>
                </div>
            </div>

            <!-- MATH -->
            <div class="col-md-4 mb-3">
                <div class="card shadow">
                    <div class="card-body">

                        <h4>Math</h4>
                        <p>Mr. Verba</p>

                        <button class="btn btn-success"
                        onclick="openNotebook('Math')">
                            Open
                        </button>

                    </div>
                </div>
            </div>

            <!-- SCIENCE -->
            <div class="col-md-4 mb-3">
                <div class="card shadow">
                    <div class="card-body">

                        <h4>Science</h4>
                        <p>Ms. Mendaro</p>

                        <button class="btn btn-danger"
                        onclick="openNotebook('Science')">
                            Open
                        </button>

                    </div>
                </div>
            </div>

        </div>

        <!-- OUTPUT -->
        <div id="output" class="output-box mt-4">
            Click a notebook.
        </div>

    </div>

</div>

<script src="main.js"></script>

</body>
</html>
